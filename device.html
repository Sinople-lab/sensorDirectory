<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vista de Dispositivo</title>
  <script type="module" src="./js/device.js" defer></script>
  <link rel="stylesheet" href="./style/device.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
<div class="app">
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <a href="index.html" class="back-btn" title="Back to dashboard">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </a>
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1 id="deviceLocation">Sensor</h1>
          <span class="brand-sub" id="deviceTitle">Cargando…</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="status-pill" id="statusPill">
          <span class="status-dot"></span>
          <span class="status-label">Conectando…</span>
        </div>
        <button class="refresh-btn" id="refreshBtn" title="Refresh">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="content">
      <section class="hero">
        <div class="hero-card">
          <div class="hero-label">Potencia Total Activa</div>
          <div class="hero-value" id="totalPower">—</div>
          <div class="hero-unit">kW</div>
          <div class="hero-meta">
            <span id="totalCurrent">— A corriente total</span>
          </div>
        </div>
        <div class="hero-side">
          <div class="mini-stat">
            <span class="mini-label">Consumo total</span>
            <span class="mini-value" id="totalEnergy">—</span>
            <span class="mini-unit">kWh</span>
          </div>
          <div class="mini-stat">
            <span class="mini-label">Energia Devuelta</span>
            <span class="mini-value" id="totalReturned">—</span>
            <span class="mini-unit">Wh</span>
          </div>
          <div class="mini-stat">
            <span class="mini-label">Energia Aparente Total</span>
            <span class="mini-value" id="totalAprt">—</span>
            <span class="mini-unit">kVA</span>
          </div>
        </div>
      </section>

      <section class="phases">
        <h2 class="section-title">Mediciones</h2>
        <div class="phase-grid" id="phaseGrid"></div>
      </section>

      <section class="lower-grid">
        <div class="panel">
          <h2 class="section-title">Informacion de Dispositivo</h2>
          <div class="info-list" id="deviceInfo"></div>
        </div>
        <div class="panel">
          <h2 class="section-title">Conexion</h2>
          <div class="info-list" id="networkInfo"></div>
        </div>
        <div class="panel">
          <h2 class="section-title">Sistema</h2>
          <div class="info-list" id="systemInfo"></div>
        </div>
      </section>
    </main>
    
    <footer class="footer">
      <div class="footer-title">Acondicionamiento de Sitios</div>
      <div class="footer-author">Martin Carballo Flores</div>
    </footer>
    
    <div class="toast" id="toast"></div>

    <div class="alarm" id="alarm" title="Device status">
      <div class="alarm-housing">
        <div class="alarm-light red" id="lightRed"></div>
        <div class="alarm-light yellow" id="lightYellow"></div>
        <div class="alarm-light green" id="lightGreen"></div>
      </div>
      <div class="alarm-label" id="alarmLabel">Conectando</div>
    </div>
  </div>
  <!-- <script type="module" src="./js/device.js"></script> -->
</div>
</body>
</html>
